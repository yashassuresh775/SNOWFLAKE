# Cortex Analyst - US economic intelligence (granular views + macro wide panel + company graph)
# Views: hackathon/economic_indicators_views.sql + hackathon/sql/02_economic_indicators_wide.sql
# PUT → @HACKATHON.DATA.SEMANTIC_MODELS/semantic_model.yaml

name: us_economic_intelligence
description: >
  US economic intelligence assistant covering unemployment trends, retail sales, interest rates,
  industrial production, headline CPI and GDP series, a pre-joined macro wide panel for multi-indicator time comparisons,
  and corporate ownership relationships. Data sourced from Bureau of Labor Statistics, US Census Bureau, Federal Reserve,
  Bureau of Economic Analysis, and Snowflake Public Data company graph.

custom_instructions: |
  Route questions to the correct logical table: unemployment (V_UNEMPLOYMENT), retail_sales (V_RETAIL_SALES),
  interest_rates (V_INTEREST_RATES), industrial_production (V_INDUSTRIAL_PRODUCTION), cpi (V_CPI), gdp (V_GDP),
  macro_wide (ECONOMIC_INDICATORS_WIDE), company_relationships (V_COMPANY_RELATIONSHIPS).
  CPI and inflation (consumer prices, CPI-U, headline inflation, all-items CPI) map to cpi (V_CPI). Gross domestic product,
  quarterly GDP, economic output in billions map to gdp (V_GDP). Use granular tables for sector-specific retail or industrial
  series (VARIABLE_NAME filters). Use macro_wide when the user compares two or more macro indicators on the same timeline
  (e.g. unemployment vs CPI, unemployment vs industrial production, GDP vs unemployment, Fed funds vs retail). Shared keys are
  GEO_ID and OBSERVATION_DATE; quarterly GDP aligns on quarter-end dates so monthly columns may be NULL on non-quarter months.
  Do not join granular V_* tables to each other unless the user explicitly asks and a valid key exists; prefer macro_wide for multi-macro-over-time.
  Macro time column is DATE on each V_* series view; macro_wide uses OBSERVATION_DATE.
  Physical value columns on granular views are unemployment_rate, retail_sales, interest_rate, production_index, cpi_index,
  gdp_value, not VALUE.
  On macro_wide use UNEMPLOYMENT_RATE, RETAIL_SALES, FED_FUNDS_RATE, TREASURY_10YR, INDUSTRIAL_PRODUCTION, CPI, GDP (may be null).
  Round outputs to 2 decimal places unless the user asks otherwise.
  For company_relationships, names may appear in ALL CAPS; parent/subsidiary questions use company_relationships.
  Company SQL rules: Query HACKATHON.DATA.V_COMPANY_RELATIONSHIPS in one level when possible. The view exposes COMPANY_NAME (parent)
  and RELATED_COMPANY_NAME (subsidiary) on every row. Do NOT define a CTE or subquery that SELECTs only subsidiary columns and then
  GROUP BY COMPANY_NAME in the outer query — COMPANY_NAME must appear in the same scope as the COUNT. For "most subsidiaries" use:
  SELECT COMPANY_NAME, COUNT(RELATED_COMPANY_NAME) AS subsidiary_count FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
  GROUP BY COMPANY_NAME ORDER BY subsidiary_count DESC LIMIT 15.
  Industrial production: phrases like industrial production, manufacturing output, factory output, sector production, or named sectors
  (aerospace, aircraft, auto, motor vehicles, chemicals, computers, etc.) map to industrial_production. The Fed series title is in
  VARIABLE_NAME; filter with VARIABLE_NAME ILIKE '%keyword%' using the user words and close synonyms (e.g. aerospace OR aircraft OR aviation).
  Trend questions: SELECT DATE, AVG(PRODUCTION_INDEX) ... GROUP BY DATE ORDER BY DATE. Do not refuse for lack of tables when industrial_production applies.
  Retail ranking questions ("top/biggest/largest retail sectors/categories in 2023") map to retail_sales with UNIT='USD',
  grouped by VARIABLE_NAME and ordered by SUM(RETAIL_SALES) DESC.
  Interest-rate comparison windows in 2022-2023 should use interest_rates and monthly Treasury bill rows when instrument is unspecified.
  Subsidiary listing questions ("what subsidiaries does X own?") should query company_relationships with COMPANY_NAME filter and
  return RELATED_COMPANY_NAME values ordered alphabetically.
  For macro causal phrasing like "before and after 2022 Fed hike cycle", you may use a time-split proxy on DATE without joining tables:
  split at 2022-03-01 (first major 2022 Fed hike period), compute month-over-month retail growth from V_RETAIL_SALES (UNIT='USD'),
  then aggregate by period and include both average growth and number of months.

tables:
  - name: unemployment
    description: >
      Monthly US unemployment rates by series (VARIABLE_NAME), including demographic segments where present.
      Sourced from BLS via curated view on Snowflake Public Data. Filter VARIABLE_NAME for overall vs segment.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_UNEMPLOYMENT
    dimensions:
      - name: indicator_name
        description: The specific unemployment indicator including demographic segment.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - unemployment indicator
          - jobless metric
          - labor metric
          - employment indicator
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
        synonyms:
          - location
          - region
          - country
          - geo
      - name: unit
        description: Unit of measurement for the value.
        expr: UNIT
        data_type: text
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
          - time
    measures:
      - name: unemployment_rate
        description: >
          Unemployment rate for the row's indicator. Aggregate with AVG for overall trend,
          filter VARIABLE_NAME for demographic segments.
        expr: UNEMPLOYMENT_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - unemployment
          - jobless rate
          - out of work rate
          - labor market rate
          - rate

  - name: retail_sales
    description: >
      Monthly US retail sales by series (VARIABLE_NAME) and unit (USD vs percent change).
      US Census Bureau, seasonally adjusted. Filter UNIT for dollar levels vs percent change.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_RETAIL_SALES
    dimensions:
      - name: sales_category
        description: Retail series name with category embedded in VARIABLE_NAME.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - retail category
          - store type
          - category
          - sector
          - industry
      - name: unit
        description: USD (dollar value) or percent change depending on series.
        expr: UNIT
        data_type: text
        synonyms:
          - measurement type
          - value type
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
      - name: industry_group
        description: Broader industry grouping from attributes.
        expr: INDUSTRY
        data_type: text
        synonyms:
          - industry category
          - sector group
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
    measures:
      - name: retail_sales_value
        description: >
          Retail sales amount for the row. Use SUM for totals, AVG for typical monthly level.
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: sum
        synonyms:
          - sales
          - revenue
          - retail revenue
          - sales volume
          - consumer spending
          - total sales
      - name: avg_retail_sales
        description: Average retail sales value.
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: avg
        synonyms:
          - average sales
          - mean sales

  - name: interest_rates
    description: >
      US interest rate series including Treasury bills, federal funds, and commercial paper
      from the Federal Reserve. Monthly and weekly rows; filter VARIABLE_NAME for the instrument.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_INTEREST_RATES
    dimensions:
      - name: rate_type
        description: Specific rate instrument such as Treasury bill or commercial paper.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - rate name
          - instrument
          - treasury type
          - rate category
      - name: release_name
        description: Federal Reserve release name.
        expr: RELEASE_NAME
        data_type: text
      - name: unit
        description: Unit of measurement, typically percent.
        expr: UNIT
        data_type: text
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
    time_dimensions:
      - name: date
        description: Observation date, monthly or weekly series.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - week
          - period
    measures:
      - name: interest_rate
        description: Interest rate as a percentage for the row's series.
        expr: INTEREST_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - rate
          - yield
          - interest
          - borrowing rate
          - treasury rate
          - fed rate
          - benchmark rate

  - name: industrial_production
    description: >
      Monthly US Federal Reserve industrial production index. Each row is one series; the series name and sector wording are in VARIABLE_NAME
      (e.g. aircraft, aerospace, motor vehicles, chemicals). Use INDUSTRY for broader grouping when present. Measure is production_index.
      For user questions about a sector, filter VARIABLE_NAME with ILIKE on keywords from the question. Seasonally adjusted, monthly.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_INDUSTRIAL_PRODUCTION
    dimensions:
      - name: industry_name
        description: >
          Fed industrial production series name; contains sector keywords (e.g. Aircraft, Aerospace, Motor vehicles).
          Filter with ILIKE for sub-sector questions.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - sector
          - industry
          - manufacturing sector
          - production category
          - industry type
          - aerospace
          - aircraft
          - aviation
          - series name
      - name: industry_group
        description: Broader industry grouping from attributes.
        expr: INDUSTRY
        data_type: text
        synonyms:
          - industry category
          - sector group
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
    measures:
      - name: production_index
        description: >
          Industrial production index level for the series.
          Higher values mean greater output relative to the base year.
        expr: PRODUCTION_INDEX
        data_type: number
        default_aggregation: avg
        synonyms:
          - production
          - output
          - manufacturing output
          - production level
          - industrial output
          - index
          - industrial production index
          - IP index
          - Fed production index

  - name: cpi
    description: >
      Monthly US headline Consumer Price Index for All Urban Consumers, all items, seasonally adjusted (BLS via curated view).
      One primary series per geo and month in typical listings; use for inflation, CPI levels, and year-over-year change questions.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_CPI
    dimensions:
      - name: series_name
        description: BLS series title for the CPI row.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - CPI series
          - inflation series
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
      - name: unit
        description: Index unit from source metadata.
        expr: UNIT
        data_type: text
      - name: frequency
        description: Observation frequency (monthly).
        expr: FREQUENCY
        data_type: text
    time_dimensions:
      - name: date
        description: Monthly CPI observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
          - time
    measures:
      - name: cpi_index
        description: Consumer price index level; use LAG(..., 12) for year-over-year percent inflation vs prior year same month.
        expr: CPI_INDEX
        data_type: number
        default_aggregation: avg
        synonyms:
          - CPI
          - consumer price index
          - inflation index
          - price level
          - headline CPI

  - name: gdp
    description: >
      Quarterly US real gross domestic product (BEA), seasonally adjusted annual rate, chained dollars — headline total
      (not per capita). Use for GDP trend, quarterly output, and growth context; frequency is quarterly.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_GDP
    dimensions:
      - name: series_name
        description: BEA series title for the GDP row.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - GDP series
          - national accounts line
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
      - name: unit
        description: Unit (e.g. billions of chained dollars).
        expr: UNIT
        data_type: text
      - name: frequency
        description: Quarterly for this view.
        expr: FREQUENCY
        data_type: text
        synonyms:
          - quarter
          - quarterly
    time_dimensions:
      - name: date
        description: Quarter observation date from BEA release.
        expr: DATE
        data_type: date
        synonyms:
          - quarter end
          - period
          - time
    measures:
      - name: gdp_value
        description: Real GDP level in the units given by UNIT (typically billions, annualized rate).
        expr: GDP_VALUE
        data_type: number
        default_aggregation: avg
        synonyms:
          - GDP
          - gross domestic product
          - output
          - economic output

  - name: macro_wide
    description: >
      Curated US macro panel: one row per GEO_ID and OBSERVATION_DATE joining headline unemployment (excludes simple demographic splits),
      total retail sales (sum of USD series), average federal funds and 10-year Treasury rates, average industrial production index,
      and CPI/GDP from V_CPI and V_GDP. Use for comparing multiple indicators over the same periods.
      Not for ranking retail categories or filtering a single industrial sub-sector—use retail_sales or industrial_production instead.
    base_table:
      database: HACKATHON
      schema: DATA
      table: ECONOMIC_INDICATORS_WIDE
    dimensions:
      - name: geography
        description: Geographic identifier aligned across measures.
        expr: GEO_ID
        data_type: text
        synonyms:
          - geo
          - region
          - country code
      - name: observation_year
        description: Calendar year of the observation.
        expr: OBSERVATION_YEAR
        data_type: number
      - name: observation_month
        description: First day of the calendar month for the observation.
        expr: OBSERVATION_MONTH
        data_type: date
    time_dimensions:
      - name: observation_date
        description: >
          Monthly (or finest available) observation date; common time key for all measures in this row.
        expr: OBSERVATION_DATE
        data_type: date
        synonyms:
          - date
          - month
          - period
          - time
    measures:
      - name: unemployment_rate
        description: Headline US unemployment rate percent for the row (aggregated across matching BLS series).
        expr: UNEMPLOYMENT_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - jobless rate
          - unemployment
      - name: retail_sales_total
        description: Sum of USD retail sales across categories for the geo and date.
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: sum
        synonyms:
          - retail sales
          - consumer spending
          - total retail
      - name: fed_funds_rate
        description: Average federal funds rate for the date when series exist.
        expr: FED_FUNDS_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - fed funds
          - policy rate
      - name: treasury_10yr_yield
        description: Average 10-year Treasury yield for the date when matched series exist.
        expr: TREASURY_10YR
        data_type: number
        default_aggregation: avg
        synonyms:
          - 10 year treasury
          - ten year yield
          - long rate
      - name: industrial_production_index
        description: Average industrial production index across Fed series for the geo and date (broad proxy).
        expr: INDUSTRIAL_PRODUCTION
        data_type: number
        default_aggregation: avg
        synonyms:
          - industrial production
          - IP index
          - manufacturing output
      - name: cpi_level
        description: Headline CPI-U all-items index from V_CPI (same monthly grain as cpi logical table).
        expr: CPI
        data_type: number
        default_aggregation: avg
        synonyms:
          - CPI
          - consumer prices
          - inflation index
      - name: gdp_level
        description: Headline quarterly real GDP from V_GDP; present on quarter-end observation dates in the spine.
        expr: GDP
        data_type: number
        default_aggregation: avg
        synonyms:
          - GDP
          - gross domestic product

  - name: company_relationships
    description: >
      Corporate ownership: each row is one parent-to-subsidiary edge. Columns include COMPANY_NAME (parent), RELATED_COMPANY_NAME
      (subsidiary), COMPANY_ID, RELATED_COMPANY_ID. For counts per parent, group by COMPANY_NAME and count RELATED_COMPANY_NAME or
      COUNT(*). Do not project only RELATED_COMPANY_NAME in an inner query then reference COMPANY_NAME outside — invalid SQL.
      View keeps parent-direction rows only. Names often ALL CAPS.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_COMPANY_RELATIONSHIPS
    dimensions:
      - name: parent_company_id
        description: Parent company unique identifier.
        expr: COMPANY_ID
        data_type: text
      - name: parent_company
        description: Parent company name in ALL CAPS e.g. KROGER CO, MARRIOTT INTERNATIONAL INC /MD/
        expr: COMPANY_NAME
        data_type: text
        synonyms:
          - owner
          - parent
          - holding company
          - parent company
          - company
      - name: subsidiary_company_id
        description: Subsidiary company unique identifier.
        expr: RELATED_COMPANY_ID
        data_type: text
      - name: subsidiary_company
        description: Subsidiary company name in ALL CAPS.
        expr: RELATED_COMPANY_NAME
        data_type: text
        synonyms:
          - subsidiary
          - owned company
          - child company
          - brand
          - division
      - name: entity_level
        description: Entity classification from source, typically Corporate.
        expr: ENTITY_LEVEL
        data_type: text
      - name: relationship_type
        description: Relationship type, view filtered to Parent edges only.
        expr: RELATIONSHIP_TYPE
        data_type: text
      - name: relationship_end_date
        description: End date if relationship ended, may be null.
        expr: RELATIONSHIP_END_DATE
        data_type: date
    time_dimensions:
      - name: relationship_start_date
        description: Start date of the parent-subsidiary relationship.
        expr: RELATIONSHIP_START_DATE
        data_type: date
    measures:
      - name: subsidiary_count
        description: Count of subsidiaries owned by a parent company.
        expr: RELATED_COMPANY_ID
        data_type: number
        default_aggregation: count
        synonyms:
          - number of subsidiaries
          - number of owned companies
          - portfolio size
          - number of brands
          - subsidiaries

verified_queries:
  - question: "What was the peak unemployment rate during COVID?"
    sql: |
      SELECT MAX(UNEMPLOYMENT_RATE) AS peak_unemployment_pct
      FROM HACKATHON.DATA.V_UNEMPLOYMENT
      WHERE "DATE" BETWEEN '2020-01-01' AND '2021-06-30'
        AND VARIABLE_NAME LIKE '%Unemployment Rate%'
        AND VARIABLE_NAME NOT LIKE '%yrs%'
        AND VARIABLE_NAME NOT LIKE '%, Men%'
        AND VARIABLE_NAME NOT LIKE '%, Women%'

  - question: "When did inflation peak in 2022?"
    sql: |
      SELECT "DATE" AS peak_month, CPI_INDEX AS peak_cpi_index
      FROM HACKATHON.DATA.V_CPI
      WHERE "DATE" BETWEEN '2022-01-01' AND '2022-12-31'
      ORDER BY CPI_INDEX DESC NULLS LAST
      LIMIT 1

  - question: "Show the Fed rate hike cycle from 2022 through 2024."
    sql: |
      SELECT "DATE", AVG(INTEREST_RATE) AS avg_rate
      FROM HACKATHON.DATA.V_INTEREST_RATES
      WHERE "DATE" BETWEEN '2022-01-01' AND '2024-12-31'
        AND VARIABLE_NAME ILIKE '%Treasury bill%'
        AND VARIABLE_NAME ILIKE '%Monthly%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "What is the US unemployment rate trend from 2020 to 2024?"
    sql: |
      SELECT "DATE", AVG(UNEMPLOYMENT_RATE) AS unemployment_rate
      FROM HACKATHON.DATA.V_UNEMPLOYMENT
      WHERE "DATE" BETWEEN '2020-01-01' AND '2024-12-31'
        AND VARIABLE_NAME LIKE '%Unemployment Rate%'
        AND VARIABLE_NAME NOT LIKE '%yrs%'
        AND VARIABLE_NAME NOT LIKE '%, Men%'
        AND VARIABLE_NAME NOT LIKE '%, Women%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "How did unemployment differ between men and women in 2022?"
    sql: |
      SELECT
        "DATE",
        AVG(CASE WHEN VARIABLE_NAME LIKE '%, Men,%' THEN UNEMPLOYMENT_RATE END) AS male_rate,
        AVG(CASE WHEN VARIABLE_NAME LIKE '%, Women,%' THEN UNEMPLOYMENT_RATE END) AS female_rate
      FROM HACKATHON.DATA.V_UNEMPLOYMENT
      WHERE "DATE" BETWEEN '2022-01-01' AND '2022-12-31'
        AND VARIABLE_NAME LIKE '%Unemployment Rate%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "What are the top retail sales categories by total value in 2023?"
    sql: |
      SELECT VARIABLE_NAME AS category, SUM(RETAIL_SALES) AS total_sales
      FROM HACKATHON.DATA.V_RETAIL_SALES
      WHERE "DATE" BETWEEN '2023-01-01' AND '2023-12-31'
        AND UNIT = 'USD'
      GROUP BY VARIABLE_NAME
      ORDER BY total_sales DESC
      LIMIT 10

  - question: "How did auto retail sales trend from 2019 to 2023?"
    sql: |
      SELECT "DATE", SUM(RETAIL_SALES) AS auto_sales
      FROM HACKATHON.DATA.V_RETAIL_SALES
      WHERE VARIABLE_NAME LIKE '%Auto and Other Motor Vehicles%'
        AND UNIT = 'USD'
        AND "DATE" BETWEEN '2019-01-01' AND '2023-12-31'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "How have Treasury bill rates changed since 2020?"
    sql: |
      SELECT "DATE", AVG(INTEREST_RATE) AS avg_rate, VARIABLE_NAME AS rate_type
      FROM HACKATHON.DATA.V_INTEREST_RATES
      WHERE "DATE" >= '2020-01-01'
        AND VARIABLE_NAME ILIKE '%Treasury bill%'
        AND VARIABLE_NAME ILIKE '%Monthly%'
      GROUP BY "DATE", VARIABLE_NAME
      ORDER BY "DATE"

  - question: "What were interest rates doing during 2022 and 2023?"
    sql: |
      SELECT "DATE", AVG(INTEREST_RATE) AS avg_rate
      FROM HACKATHON.DATA.V_INTEREST_RATES
      WHERE "DATE" BETWEEN '2022-01-01' AND '2023-12-31'
        AND VARIABLE_NAME ILIKE '%Treasury bill%'
        AND VARIABLE_NAME ILIKE '%Monthly%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "Which industrial sectors had the highest production in 2023?"
    sql: |
      SELECT VARIABLE_NAME AS sector, AVG(PRODUCTION_INDEX) AS avg_production_index
      FROM HACKATHON.DATA.V_INDUSTRIAL_PRODUCTION
      WHERE "DATE" BETWEEN '2023-01-01' AND '2023-12-31'
      GROUP BY VARIABLE_NAME
      ORDER BY avg_production_index DESC
      LIMIT 10

  - question: "How did aerospace production change from 2019 to 2023?"
    sql: |
      SELECT "DATE", AVG(PRODUCTION_INDEX) AS production_index
      FROM HACKATHON.DATA.V_INDUSTRIAL_PRODUCTION
      WHERE (VARIABLE_NAME ILIKE '%Aerospace%' OR VARIABLE_NAME ILIKE '%Aircraft%')
        AND "DATE" BETWEEN '2019-01-01' AND '2023-12-31'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "How did aerospace industrial production trend from 2019 to 2023?"
    sql: |
      SELECT "DATE", AVG(PRODUCTION_INDEX) AS production_index
      FROM HACKATHON.DATA.V_INDUSTRIAL_PRODUCTION
      WHERE (VARIABLE_NAME ILIKE '%Aerospace%' OR VARIABLE_NAME ILIKE '%Aircraft%')
        AND "DATE" BETWEEN '2019-01-01' AND '2023-12-31'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - question: "Which company owns the most subsidiaries?"
    sql: |
      SELECT COMPANY_NAME AS parent_company,
             COUNT(RELATED_COMPANY_NAME) AS subsidiary_count
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      GROUP BY COMPANY_NAME
      ORDER BY subsidiary_count DESC
      LIMIT 15

  - question: "What subsidiaries does Kroger own?"
    sql: |
      SELECT RELATED_COMPANY_NAME AS subsidiary
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME = 'KROGER CO'
      ORDER BY RELATED_COMPANY_NAME

  - question: "What subsidiaries does Marriott own?"
    sql: |
      SELECT RELATED_COMPANY_NAME AS subsidiary
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME = 'MARRIOTT INTERNATIONAL INC /MD/'
      ORDER BY RELATED_COMPANY_NAME

  - question: "Which retail companies have the most subsidiaries?"
    sql: |
      SELECT COMPANY_NAME AS parent_company,
             COUNT(RELATED_COMPANY_NAME) AS subsidiary_count
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME IN (
        'KROGER CO',
        'ALBERTSONS COMPANIES, INC.',
        'INSPIRE BRANDS INC',
        'RESTAURANT BRANDS INTERNATIONAL INC.'
      )
      GROUP BY COMPANY_NAME
      ORDER BY subsidiary_count DESC

  - question: "Which companies have more than 5 subsidiaries?"
    sql: |
      SELECT COMPANY_NAME AS parent_company,
             COUNT(RELATED_COMPANY_NAME) AS subsidiary_count
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      GROUP BY COMPANY_NAME
      HAVING COUNT(RELATED_COMPANY_NAME) > 5
      ORDER BY subsidiary_count DESC

  - question: "What are the biggest retail sectors in 2023?"
    sql: |
      SELECT VARIABLE_NAME AS category, SUM(RETAIL_SALES) AS total_sales
      FROM HACKATHON.DATA.V_RETAIL_SALES
      WHERE "DATE" BETWEEN '2023-01-01' AND '2023-12-31'
        AND UNIT = 'USD'
      GROUP BY VARIABLE_NAME
      ORDER BY total_sales DESC
      LIMIT 10

  - question: "Compare retail sales growth before and after interest rates hikes in 2022."
    sql: |
      WITH monthly_sales AS (
        SELECT DATE_TRUNC('month', "DATE") AS month, SUM(RETAIL_SALES) AS total_sales
        FROM HACKATHON.DATA.V_RETAIL_SALES
        WHERE UNIT = 'USD'
          AND "DATE" BETWEEN '2019-01-01' AND '2024-12-31'
        GROUP BY 1
      ),
      growth AS (
        SELECT
          month,
          total_sales,
          100 * (total_sales - LAG(total_sales) OVER (ORDER BY month))
            / NULLIF(LAG(total_sales) OVER (ORDER BY month), 0) AS mom_growth_pct
        FROM monthly_sales
      )
      SELECT
        CASE WHEN month < '2022-03-01' THEN 'before_hikes' ELSE 'after_hikes' END AS period,
        ROUND(AVG(mom_growth_pct), 2) AS avg_mom_growth_pct,
        ROUND(AVG(total_sales), 2) AS avg_monthly_sales,
        COUNT(*) AS months
      FROM growth
      WHERE mom_growth_pct IS NOT NULL
      GROUP BY 1
      ORDER BY 1

  - question: "Compare unemployment and industrial production over time since 2020."
    sql: |
      SELECT
        OBSERVATION_DATE,
        UNEMPLOYMENT_RATE,
        INDUSTRIAL_PRODUCTION
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= '2020-01-01'
      ORDER BY OBSERVATION_DATE

  - question: "Compare unemployment and CPI on the same monthly timeline since 2020."
    sql: |
      SELECT
        OBSERVATION_DATE,
        UNEMPLOYMENT_RATE,
        CPI
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= '2020-01-01'
      ORDER BY OBSERVATION_DATE

  - question: "Show monthly headline CPI index from 2019 through 2024."
    sql: |
      SELECT "DATE", CPI_INDEX, VARIABLE_NAME
      FROM HACKATHON.DATA.V_CPI
      WHERE "DATE" BETWEEN '2019-01-01' AND '2024-12-31'
      ORDER BY "DATE"

  - question: "What was the peak year-over-year headline CPI inflation rate in 2022?"
    sql: |
      WITH m AS (
        SELECT
          "DATE",
          CPI_INDEX AS cpi,
          LAG(CPI_INDEX, 12) OVER (PARTITION BY GEO_ID ORDER BY "DATE") AS cpi_prior_year
        FROM HACKATHON.DATA.V_CPI
      )
      SELECT
        ROUND(MAX(100 * (cpi - cpi_prior_year) / NULLIF(cpi_prior_year, 0)), 2) AS peak_yoy_inflation_pct_2022
      FROM m
      WHERE YEAR("DATE") = 2022
        AND cpi_prior_year IS NOT NULL

  - question: "Show US real GDP by quarter for the last five years."
    sql: |
      SELECT "DATE", GDP_VALUE, UNIT, VARIABLE_NAME, FREQUENCY
      FROM HACKATHON.DATA.V_GDP
      WHERE "DATE" >= DATEADD(year, -5, CURRENT_DATE())
      ORDER BY "DATE"

  - question: "Compare average month-over-month retail sales growth before and after the 2022 Fed hike cycle, and include the number of months in each period."
    sql: |
      WITH monthly_sales AS (
        SELECT DATE_TRUNC('month', "DATE") AS month, SUM(RETAIL_SALES) AS total_sales
        FROM HACKATHON.DATA.V_RETAIL_SALES
        WHERE UNIT = 'USD'
          AND "DATE" BETWEEN '2019-01-01' AND '2024-12-31'
