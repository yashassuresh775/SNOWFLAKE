# Cortex Analyst - US economic intelligence (granular views + company graph)
# Views: hackathon/economic_indicators_views.sql  |  PUT → @HACKATHON.DATA.SEMANTIC_MODELS/semantic_model.yaml

name: us_economic_intelligence
description: >
  US economic intelligence assistant covering unemployment trends, retail sales, interest rates,
  industrial production, and corporate ownership relationships. Data sourced from Bureau of Labor Statistics,
  US Census Bureau, Federal Reserve, and Snowflake Public Data company graph.

custom_instructions: |
  Route questions to the correct logical table: unemployment (V_UNEMPLOYMENT), retail_sales (V_RETAIL_SALES),
  interest_rates (V_INTEREST_RATES), industrial_production (V_INDUSTRIAL_PRODUCTION), company_relationships (V_COMPANY_RELATIONSHIPS).
  Do not join across these tables unless the user explicitly asks and a valid key exists.
  Macro time column is DATE on each V_* series view.
  Physical value columns are unemployment_rate, retail_sales, interest_rate, production_index, not VALUE.
  Round outputs to 2 decimal places unless the user asks otherwise.
  For company_relationships, names may appear in ALL CAPS; parent/subsidiary questions use company_relationships.

tables:
  - name: unemployment
    description: >
      Monthly US unemployment rates by series (VARIABLE_NAME), including demographic segments where present.
      Sourced from BLS via curated view on Snowflake Public Data. Filter VARIABLE_NAME for overall vs segment.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_UNEMPLOYMENT
    primary_key:
      columns:
        - GEO_ID
        - DATE
        - VARIABLE_NAME
    dimensions:
      - name: indicator_name
        description: The specific unemployment indicator including demographic segment.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - unemployment indicator
          - jobless metric
          - labor metric
          - employment indicator
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
        synonyms:
          - location
          - region
          - country
          - geo
      - name: unit
        description: Unit of measurement for the value.
        expr: UNIT
        data_type: text
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
          - time
    measures:
      - name: unemployment_rate
        description: >
          Unemployment rate for the row's indicator. Aggregate with AVG for overall trend,
          filter VARIABLE_NAME for demographic segments.
        expr: UNEMPLOYMENT_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - unemployment
          - jobless rate
          - out of work rate
          - labor market rate
          - rate

  - name: retail_sales
    description: >
      Monthly US retail sales by series (VARIABLE_NAME) and unit (USD vs percent change).
      US Census Bureau, seasonally adjusted. Filter UNIT for dollar levels vs percent change.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_RETAIL_SALES
    primary_key:
      columns:
        - GEO_ID
        - DATE
        - VARIABLE_NAME
        - UNIT
    dimensions:
      - name: sales_category
        description: Retail series name with category embedded in VARIABLE_NAME.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - retail category
          - store type
          - category
          - sector
          - industry
      - name: unit
        description: USD (dollar value) or percent change depending on series.
        expr: UNIT
        data_type: text
        synonyms:
          - measurement type
          - value type
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
      - name: industry_group
        description: Broader industry grouping from attributes.
        expr: INDUSTRY
        data_type: text
        synonyms:
          - industry category
          - sector group
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
    measures:
      - name: retail_sales_value
        description: >
          Retail sales amount for the row. Use SUM for totals, AVG for typical monthly level.
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: sum
        synonyms:
          - sales
          - revenue
          - retail revenue
          - sales volume
          - consumer spending
          - total sales
      - name: avg_retail_sales
        description: Average retail sales value.
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: avg
        synonyms:
          - average sales
          - mean sales

  - name: interest_rates
    description: >
      US interest rate series including Treasury bills, federal funds, and commercial paper
      from the Federal Reserve. Monthly and weekly rows; filter VARIABLE_NAME for the instrument.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_INTEREST_RATES
    primary_key:
      columns:
        - GEO_ID
        - DATE
        - VARIABLE_NAME
    dimensions:
      - name: rate_type
        description: Specific rate instrument such as Treasury bill or commercial paper.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - rate name
          - instrument
          - treasury type
          - rate category
      - name: release_name
        description: Federal Reserve release name.
        expr: RELEASE_NAME
        data_type: text
      - name: unit
        description: Unit of measurement, typically percent.
        expr: UNIT
        data_type: text
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
    time_dimensions:
      - name: date
        description: Observation date, monthly or weekly series.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - week
          - period
    measures:
      - name: interest_rate
        description: Interest rate as a percentage for the row's series.
        expr: INTEREST_RATE
        data_type: number
        default_aggregation: avg
        synonyms:
          - rate
          - yield
          - interest
          - borrowing rate
          - treasury rate
          - fed rate
          - benchmark rate

  - name: industrial_production
    description: >
      Monthly US industrial production index by manufacturing series (VARIABLE_NAME).
      Federal Reserve, seasonally adjusted. Higher index = more output vs base year.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_INDUSTRIAL_PRODUCTION
    primary_key:
      columns:
        - GEO_ID
        - DATE
        - VARIABLE_NAME
    dimensions:
      - name: industry_name
        description: Specific industrial sector series name.
        expr: VARIABLE_NAME
        data_type: text
        synonyms:
          - sector
          - industry
          - manufacturing sector
          - production category
          - industry type
      - name: industry_group
        description: Broader industry grouping from attributes.
        expr: INDUSTRY
        data_type: text
        synonyms:
          - industry category
          - sector group
      - name: geography
        description: Geographic identifier.
        expr: GEO_ID
        data_type: text
    time_dimensions:
      - name: date
        description: Monthly observation date.
        expr: DATE
        data_type: date
        synonyms:
          - month
          - period
    measures:
      - name: production_index
        description: >
          Industrial production index level for the series.
          Higher values mean greater output relative to the base year.
        expr: PRODUCTION_INDEX
        data_type: number
        default_aggregation: avg
        synonyms:
          - production
          - output
          - manufacturing output
          - production level
          - industrial output
          - index

  - name: company_relationships
    description: >
      Corporate ownership relationships showing parent companies and their subsidiaries.
      View V_COMPANY_RELATIONSHIPS keeps parent-direction rows only.
      Covers 291 parent companies and 394 subsidiaries. Names appear in ALL CAPS.
    base_table:
      database: HACKATHON
      schema: DATA
      table: V_COMPANY_RELATIONSHIPS
    primary_key:
      columns:
        - COMPANY_ID
        - RELATED_COMPANY_ID
        - RELATIONSHIP_START_DATE
    dimensions:
      - name: parent_company_id
        description: Parent company unique identifier.
        expr: COMPANY_ID
        data_type: text
      - name: parent_company
        description: Parent company name in ALL CAPS e.g. KROGER CO, MARRIOTT INTERNATIONAL INC /MD/
        expr: COMPANY_NAME
        data_type: text
        synonyms:
          - owner
          - parent
          - holding company
          - parent company
          - company
      - name: subsidiary_company_id
        description: Subsidiary company unique identifier.
        expr: RELATED_COMPANY_ID
        data_type: text
      - name: subsidiary_company
        description: Subsidiary company name in ALL CAPS.
        expr: RELATED_COMPANY_NAME
        data_type: text
        synonyms:
          - subsidiary
          - owned company
          - child company
          - brand
          - division
      - name: entity_level
        description: Entity classification from source, typically Corporate.
        expr: ENTITY_LEVEL
        data_type: text
      - name: relationship_type
        description: Relationship type, view filtered to Parent edges only.
        expr: RELATIONSHIP_TYPE
        data_type: text
      - name: relationship_end_date
        description: End date if relationship ended, may be null.
        expr: RELATIONSHIP_END_DATE
        data_type: date
    time_dimensions:
      - name: relationship_start_date
        description: Start date of the parent-subsidiary relationship.
        expr: RELATIONSHIP_START_DATE
        data_type: date
    measures:
      - name: subsidiary_count
        description: Count of subsidiaries owned by a parent company.
        expr: RELATED_COMPANY_ID
        data_type: number
        default_aggregation: count
        synonyms:
          - number of subsidiaries
          - number of owned companies
          - portfolio size
          - number of brands
          - subsidiaries

verified_queries:
  - name: unemployment_trend_2020_2024
    question: "What is the US unemployment rate trend from 2020 to 2024?"
    sql: |
      SELECT "DATE", AVG(UNEMPLOYMENT_RATE) AS unemployment_rate
      FROM HACKATHON.DATA.V_UNEMPLOYMENT
      WHERE "DATE" BETWEEN '2020-01-01' AND '2024-12-31'
        AND VARIABLE_NAME LIKE '%Unemployment Rate%'
        AND VARIABLE_NAME NOT LIKE '%yrs%'
        AND VARIABLE_NAME NOT LIKE '%, Men%'
        AND VARIABLE_NAME NOT LIKE '%, Women%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - name: unemployment_men_vs_women_2022
    question: "How did unemployment differ between men and women in 2022?"
    sql: |
      SELECT
        "DATE",
        AVG(CASE WHEN VARIABLE_NAME LIKE '%, Men,%' THEN UNEMPLOYMENT_RATE END) AS male_rate,
        AVG(CASE WHEN VARIABLE_NAME LIKE '%, Women,%' THEN UNEMPLOYMENT_RATE END) AS female_rate
      FROM HACKATHON.DATA.V_UNEMPLOYMENT
      WHERE "DATE" BETWEEN '2022-01-01' AND '2022-12-31'
        AND VARIABLE_NAME LIKE '%Unemployment Rate%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - name: retail_top_categories_2023
    question: "What are the top retail sales categories by total value in 2023?"
    sql: |
      SELECT VARIABLE_NAME AS category, SUM(RETAIL_SALES) AS total_sales
      FROM HACKATHON.DATA.V_RETAIL_SALES
      WHERE "DATE" BETWEEN '2023-01-01' AND '2023-12-31'
        AND UNIT = 'USD'
      GROUP BY VARIABLE_NAME
      ORDER BY total_sales DESC
      LIMIT 10

  - name: retail_auto_trend_2019_2023
    question: "How did auto retail sales trend from 2019 to 2023?"
    sql: |
      SELECT "DATE", SUM(RETAIL_SALES) AS auto_sales
      FROM HACKATHON.DATA.V_RETAIL_SALES
      WHERE VARIABLE_NAME LIKE '%Auto and Other Motor Vehicles%'
        AND UNIT = 'USD'
        AND "DATE" BETWEEN '2019-01-01' AND '2023-12-31'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - name: interest_treasury_bills_since_2020
    question: "How have Treasury bill rates changed since 2020?"
    sql: |
      SELECT "DATE", AVG(INTEREST_RATE) AS avg_rate, VARIABLE_NAME AS rate_type
      FROM HACKATHON.DATA.V_INTEREST_RATES
      WHERE "DATE" >= '2020-01-01'
        AND VARIABLE_NAME ILIKE '%Treasury bill%'
        AND VARIABLE_NAME ILIKE '%Monthly%'
      GROUP BY "DATE", VARIABLE_NAME
      ORDER BY "DATE"

  - name: interest_treasury_2022_2023
    question: "What were interest rates doing during 2022 and 2023?"
    sql: |
      SELECT "DATE", AVG(INTEREST_RATE) AS avg_rate
      FROM HACKATHON.DATA.V_INTEREST_RATES
      WHERE "DATE" BETWEEN '2022-01-01' AND '2023-12-31'
        AND VARIABLE_NAME ILIKE '%Treasury bill%'
        AND VARIABLE_NAME ILIKE '%Monthly%'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - name: industrial_top_sectors_2023
    question: "Which industrial sectors had the highest production in 2023?"
    sql: |
      SELECT VARIABLE_NAME AS sector, AVG(PRODUCTION_INDEX) AS avg_production_index
      FROM HACKATHON.DATA.V_INDUSTRIAL_PRODUCTION
      WHERE "DATE" BETWEEN '2023-01-01' AND '2023-12-31'
      GROUP BY VARIABLE_NAME
      ORDER BY avg_production_index DESC
      LIMIT 10

  - name: industrial_aerospace_2019_2023
    question: "How did aerospace production change from 2019 to 2023?"
    sql: |
      SELECT "DATE", AVG(PRODUCTION_INDEX) AS production_index
      FROM HACKATHON.DATA.V_INDUSTRIAL_PRODUCTION
      WHERE VARIABLE_NAME ILIKE '%Aerospace%'
        AND "DATE" BETWEEN '2019-01-01' AND '2023-12-31'
      GROUP BY "DATE"
      ORDER BY "DATE"

  - name: company_most_subsidiaries
    question: "Which company owns the most subsidiaries?"
    sql: |
      SELECT COMPANY_NAME AS parent_company,
             COUNT(RELATED_COMPANY_NAME) AS subsidiary_count
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      GROUP BY COMPANY_NAME
      ORDER BY subsidiary_count DESC
      LIMIT 15

  - name: company_kroger_subsidiaries
    question: "What subsidiaries does Kroger own?"
    sql: |
      SELECT RELATED_COMPANY_NAME AS subsidiary
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME = 'KROGER CO'
      ORDER BY RELATED_COMPANY_NAME

  - name: company_marriott_subsidiaries
    question: "What subsidiaries does Marriott own?"
    sql: |
      SELECT RELATED_COMPANY_NAME AS subsidiary
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME = 'MARRIOTT INTERNATIONAL INC /MD/'
      ORDER BY RELATED_COMPANY_NAME

  - name: company_retail_parents_subsidiary_counts
    question: "Which retail companies have the most subsidiaries?"
    sql: |
      SELECT COMPANY_NAME AS parent_company,
             COUNT(RELATED_COMPANY_NAME) AS subsidiary_count
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      WHERE COMPANY_NAME IN (
        'KROGER CO',
        'ALBERTSONS COMPANIES, INC.',
        'INSPIRE BRANDS INC',
        'RESTAURANT BRANDS INTERNATIONAL INC.'
      )
      GROUP BY COMPANY_NAME
      ORDER BY subsidiary_count DESC
