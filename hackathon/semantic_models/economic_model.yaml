# Cortex Analyst semantic model — macro + company graph
# Macro: HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE (02_economic_indicators_wide.sql)
# Company: HACKATHON.DATA.V_COMPANY_RELATIONSHIPS (Cybersyn listing → replace CYBERSYN_MARKETPLACE_DB in economic_indicators_views.sql)
# Upload: PUT to @HACKATHON.DATA.SEMANTIC_MODELS

name: us_economic_intelligence
description: |
  Two domains: (1) US macroeconomic time series — labor, inflation, GDP, retail, rates, industrial production — at
  GEO_ID × OBSERVATION_DATE grain on ECONOMIC_INDICATORS_WIDE. (2) Corporate relationships — parent/subsidiary-style
  edges on V_COMPANY_RELATIONSHIPS (filtered parent-direction rows from Cybersyn Company Relationship Graph).
  These tables are not joined; route macro questions to economic_indicators and corporate-structure questions to company_relationships.

custom_instructions: |
  For macro / economy / inflation / Fed / unemployment / GDP / retail questions, use logical table economic_indicators (ECONOMIC_INDICATORS_WIDE).
  For parent company, subsidiary, holding company, corporate structure, or "who owns whom" questions, use company_relationships (V_COMPANY_RELATIONSHIPS).
  Do not join macro data to company relationships unless the user explicitly asks to combine domains and a shared key exists.
  Default to US national context when the user does not specify geography for macro series.
  Prefer monthly frequency for macro trends unless the user asks for quarterly, annual, or YoY.
  Filter macro series on OBSERVATION_DATE; use OBSERVATION_YEAR or OBSERVATION_MONTH for rollups.
  When a macro measure is NULL, treat it as missing — do not invent values.
  Round displayed numbers to 2 decimal places unless the user asks for more precision.
  For corporate rows, prefer filtering active relationships (RELATIONSHIP_END_DATE IS NULL) when the user asks for "current" structure, if end dates are populated.

tables:
  - name: economic_indicators
    description: |
      Wide monthly (mostly) economic fact table at GEO_ID × OBSERVATION_DATE grain. Each column is a distinct indicator
      from curated views on SNOWFLAKE_PUBLIC_DATA_FREE financial_economic_indicators_* tables.

    base_table:
      database: HACKATHON
      schema: DATA
      table: ECONOMIC_INDICATORS_WIDE

    primary_key:
      columns:
        - GEO_ID
        - OBSERVATION_DATE

    time_dimensions:
      - name: observation_date
        synonyms: ["date", "day", "period", "when", "time", "as of", "calendar date"]
        description: Calendar date of the observation; use for ranges, trends, and latest-available logic.
        expr: OBSERVATION_DATE
        data_type: date
        unique: false

    dimensions:
      - name: geo_id
        synonyms: ["geo", "fips", "geography", "region", "area", "location", "state", "country code"]
        description: Geographic identifier for the series (e.g. US national or state FIPS-style codes from the source).
        expr: GEO_ID
        data_type: text
        unique: false

      - name: observation_year
        synonyms: ["year", "calendar year", "annual", "Y", "in 2020", "2020"]
        description: Calendar year extracted from OBSERVATION_DATE for annual rollups and filters.
        expr: OBSERVATION_YEAR
        data_type: number
        unique: false

      - name: observation_month
        synonyms: ["month", "month start", "first of month", "by month", "monthly bucket"]
        description: Month start timestamp (DATE_TRUNC month) for aligning monthly series.
        expr: OBSERVATION_MONTH
        data_type: date
        unique: false

    measures:
      - name: unemployment_rate
        synonyms:
          [
            "jobless rate",
            "unemployment",
            "U-3",
            "labor market",
            "out of work",
            "unemployed",
            "jobs",
          ]
        description: Unemployment rate as a percent of the labor force (BLS-style series in curated view).
        expr: UNEMPLOYMENT_RATE
        data_type: number
        default_aggregation: avg
        sample_values: [3.5, 4.0, 14.7, 6.0, 3.7]

      - name: cpi
        synonyms:
          [
            "inflation",
            "consumer price index",
            "consumer price",
            "cost of living",
            "prices",
            "CPI",
            "price level",
          ]
        description: Consumer Price Index level (higher = higher price level vs index base over time).
        expr: CPI
        data_type: number
        default_aggregation: avg
        sample_values: [250, 260, 280, 296, 310]

      - name: fed_funds_rate
        synonyms:
          [
            "federal funds rate",
            "fed funds",
            "fed rate",
            "policy rate",
            "benchmark rate",
            "interest rate",
            "FOMC rate",
            "rate hikes",
          ]
        description: Short-term policy / effective Fed funds related rate from the wide table (Fed series).
        expr: FED_FUNDS_RATE
        data_type: number
        default_aggregation: avg
        sample_values: [0.08, 0.25, 2.5, 5.33]

      - name: gdp
        synonyms:
          [
            "gross domestic product",
            "GDP",
            "economic output",
            "national output",
            "economy size",
            "real gdp",
          ]
        description: GDP level or index as provided by the source feed (frequency may be monthly/quarterly/annual in data).
        expr: GDP
        data_type: number
        default_aggregation: avg

      - name: retail_sales
        synonyms:
          [
            "retail sales",
            "retail",
            "census retail",
            "store sales",
            "consumer spending at retail",
          ]
        description: Monthly retail sales indicator (Census retail series in curated view).
        expr: RETAIL_SALES
        data_type: number
        default_aggregation: avg

      - name: industrial_production
        synonyms:
          [
            "industrial production",
            "IP index",
            "factory output",
            "manufacturing production",
            "Fed industrial production",
          ]
        description: Federal Reserve industrial production index.
        expr: INDUSTRIAL_PRODUCTION
        data_type: number
        default_aggregation: avg

      - name: treasury_10yr
        synonyms:
          [
            "10-year treasury",
            "10 year yield",
            "10Y treasury",
            "long-term treasury yield",
            "treasury yield",
            "bond yield",
          ]
        description: Long-term Treasury yield where present in the wide table (10-year style series).
        expr: TREASURY_10YR
        data_type: number
        default_aggregation: avg

      - name: treasury_fed_spread
        synonyms:
          ["yield curve", "10y minus fed", "term spread", "treasury spread", "rates spread"]
        description: Simple spread between 10Y Treasury yield and Fed funds rate (rough policy vs long-rate comparison).
        expr: TREASURY_10YR - FED_FUNDS_RATE
        data_type: number
        default_aggregation: avg

  - name: company_relationships
    description: |
      Parent-direction company relationship edges (Cybersyn) exposed as HACKATHON.DATA.V_COMPANY_RELATIONSHIPS.
      One row per parent-related pair in the filtered extract; use for subsidiaries, holdings, and corporate hierarchy questions.

    base_table:
      database: HACKATHON
      schema: DATA
      table: V_COMPANY_RELATIONSHIPS

    primary_key:
      columns:
        - COMPANY_ID
        - RELATED_COMPANY_ID
        - RELATIONSHIP_START_DATE

    time_dimensions:
      - name: relationship_start_date
        synonyms: ["start date", "effective date", "since", "from"]
        description: Start date of the relationship edge.
        expr: RELATIONSHIP_START_DATE
        data_type: date
        unique: false

    dimensions:
      - name: company_id
        synonyms: ["parent company id", "company id", "firm id", "issuer id"]
        description: Identifier for the company on the parent side of the relationship.
        expr: COMPANY_ID
        data_type: text
        unique: false

      - name: company_name
        synonyms: ["parent", "parent company", "holding company", "firm", "company"]
        description: Name of the parent-side company.
        expr: COMPANY_NAME
        data_type: text
        unique: false

      - name: related_company_id
        synonyms: ["subsidiary id", "child id", "related entity id"]
        description: Identifier for the related company (e.g. subsidiary).
        expr: RELATED_COMPANY_ID
        data_type: text
        unique: false

      - name: related_company_name
        synonyms: ["subsidiary", "child company", "division", "unit", "related entity"]
        description: Name of the related company.
        expr: RELATED_COMPANY_NAME
        data_type: text
        unique: false

      - name: entity_level
        synonyms: ["reporting level", "hierarchy level", "level"]
        description: Hierarchy level from the source graph.
        expr: ENTITY_LEVEL
        data_type: text
        unique: false

      - name: relationship_type
        synonyms: ["relationship", "edge type", "link type"]
        description: Relationship type; this view is restricted to parent-style rows.
        expr: RELATIONSHIP_TYPE
        data_type: text
        unique: false

      - name: relationship_end_date
        synonyms: ["end date", "until", "terminated"]
        description: End date when the relationship ended; may be null if ongoing.
        expr: RELATIONSHIP_END_DATE
        data_type: date
        unique: false

    measures:
      - name: relationship_row
        synonyms: ["count", "edges", "links", "pairs"]
        description: Constant 1 per row for counting relationship edges.
        expr: 1
        data_type: number
        default_aggregation: sum

verified_queries:
  - name: covid_peak_unemployment
    question: What was the peak unemployment rate in 2020 and when did it occur?
    sql: |
      SELECT OBSERVATION_DATE, UNEMPLOYMENT_RATE AS PEAK_UNEMPLOYMENT
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_YEAR = 2020
        AND UNEMPLOYMENT_RATE IS NOT NULL
      ORDER BY UNEMPLOYMENT_RATE DESC
      LIMIT 1

  - name: unemployment_trend_since_2020
    question: Show me the unemployment rate trend since 2020
    sql: |
      SELECT OBSERVATION_DATE, UNEMPLOYMENT_RATE
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= '2020-01-01'
        AND UNEMPLOYMENT_RATE IS NOT NULL
      ORDER BY OBSERVATION_DATE

  - name: retail_sales_since_covid
    question: Show retail sales trend since COVID
    sql: |
      SELECT OBSERVATION_DATE, RETAIL_SALES
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= '2020-03-01'
        AND RETAIL_SALES IS NOT NULL
      ORDER BY OBSERVATION_DATE

  - name: fed_funds_2022
    question: How did the Fed funds rate change during 2022?
    sql: |
      SELECT OBSERVATION_DATE, FED_FUNDS_RATE
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_YEAR = 2022
        AND FED_FUNDS_RATE IS NOT NULL
      ORDER BY OBSERVATION_DATE

  - name: unemployment_and_cpi_since_2020
    question: Compare unemployment and inflation since 2020
    sql: |
      SELECT OBSERVATION_DATE, UNEMPLOYMENT_RATE, CPI
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= '2020-01-01'
        AND (UNEMPLOYMENT_RATE IS NOT NULL OR CPI IS NOT NULL)
      ORDER BY OBSERVATION_DATE

  - name: latest_fed_funds
    question: What is the current Fed funds rate?
    sql: |
      SELECT OBSERVATION_DATE, FED_FUNDS_RATE
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE FED_FUNDS_RATE IS NOT NULL
      ORDER BY OBSERVATION_DATE DESC
      LIMIT 1

  - name: latest_unemployment
    question: What is the current unemployment rate?
    sql: |
      SELECT OBSERVATION_DATE, UNEMPLOYMENT_RATE
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE UNEMPLOYMENT_RATE IS NOT NULL
      ORDER BY OBSERVATION_DATE DESC
      LIMIT 1

  - name: industrial_production_trend
    question: Show industrial production over the last 5 years
    sql: |
      SELECT OBSERVATION_DATE, INDUSTRIAL_PRODUCTION
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= DATEADD(year, -5, CURRENT_DATE())
        AND INDUSTRIAL_PRODUCTION IS NOT NULL
      ORDER BY OBSERVATION_DATE

  - name: gdp_trend_5y
    question: Show GDP over the last 5 years
    sql: |
      SELECT OBSERVATION_DATE, GDP
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= DATEADD(year, -5, CURRENT_DATE())
        AND GDP IS NOT NULL
      ORDER BY OBSERVATION_DATE

  - name: ten_year_treasury_latest
    question: What is the 10-year Treasury yield?
    sql: |
      SELECT OBSERVATION_DATE, TREASURY_10YR
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE TREASURY_10YR IS NOT NULL
      ORDER BY OBSERVATION_DATE DESC
      LIMIT 1

  - name: key_indicators_2020
    question: Show unemployment, CPI, Fed funds, and retail sales in 2020
    sql: |
      SELECT
        OBSERVATION_DATE,
        UNEMPLOYMENT_RATE,
        CPI,
        FED_FUNDS_RATE,
        RETAIL_SALES
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_YEAR = 2020
      ORDER BY OBSERVATION_DATE

  - name: year_highest_unemployment
    question: Which year had the highest average unemployment in the dataset?
    sql: |
      SELECT OBSERVATION_YEAR, AVG(UNEMPLOYMENT_RATE) AS AVG_UNEMPLOYMENT
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE UNEMPLOYMENT_RATE IS NOT NULL
      GROUP BY OBSERVATION_YEAR
      ORDER BY AVG_UNEMPLOYMENT DESC
      LIMIT 1

  - name: fed_funds_and_cpi_correlation_window
    question: Show Fed funds rate and CPI over the last 10 years
    sql: |
      SELECT OBSERVATION_DATE, FED_FUNDS_RATE, CPI
      FROM HACKATHON.DATA.ECONOMIC_INDICATORS_WIDE
      WHERE OBSERVATION_DATE >= DATEADD(year, -10, CURRENT_DATE())
        AND (FED_FUNDS_RATE IS NOT NULL OR CPI IS NOT NULL)
      ORDER BY OBSERVATION_DATE

  - name: company_list_parent_subsidiary_pairs
    question: List parent companies and their related companies
    sql: |
      SELECT COMPANY_NAME, RELATED_COMPANY_NAME, RELATIONSHIP_START_DATE, RELATIONSHIP_END_DATE
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      ORDER BY COMPANY_NAME, RELATED_COMPANY_NAME
      LIMIT 100

  - name: company_count_parent_edges
    question: How many parent company relationships are in the dataset?
    sql: |
      SELECT COUNT(*) AS PARENT_RELATIONSHIP_ROWS
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS

  - name: company_top_parents_by_subsidiaries
    question: Which parent companies have the most subsidiaries?
    sql: |
      SELECT COMPANY_NAME, COUNT(*) AS SUBSIDIARY_COUNT
      FROM HACKATHON.DATA.V_COMPANY_RELATIONSHIPS
      GROUP BY COMPANY_NAME
      ORDER BY SUBSIDIARY_COUNT DESC
      LIMIT 15
